<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School of Tomorrow | Student Login</title>
    <link rel="stylesheet" href="login style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="form-page">

    <div class="form-wrapper">
        <form class="glass-card">
            <div class="brand-logo">SOT LAB</div>
            <h2>Create Student Account</h2>
            <p class="form-subtitle">Please fill in the details to register for the 2026 academic year.</p>

            <div class="field-row three-col">
                <div class="field-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name" required>
                </div>
                <div class="field-group">
                    <label>Middle Name</label>
                    <input type="text" placeholder="Middle Name" required>
                </div>
                <div class="field-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last Name" required>
                </div>
            </div>

            <div class="field-row two-col">
                <div class="field-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="field-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="field-row three-col">
                <div class="field-group">
                    <label>Age</label>
                    <input type="number" min="12" max="20" placeholder="Age" required>
                </div>
                <div class="field-group">
                    <label>Grade</label>
                    <select required>
                        <option value="" disabled selected>Select Grade</option>
                        <option>Grade 9</option>
                        <option>Grade 10</option>
                        <option>Grade 11</option>
                        <option>Grade 12</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Section</label>
                    <input type="text" placeholder="e.g. A" required>
                </div>
            </div>

            <div class="field-group">
                <label>School Branch</label>
                <select required>
                    <option value="" disabled selected>Select your branch location</option>
                    <option>Hayahulet Branch</option>
                    <option>Rwanda Branch</option>
                    <option>Bole Eyerusalem Branch</option>
                    <option>Misrak Branch</option>
                    <option>CMC Branch</option>
                    <option>Lem Branch</option>
                    <option>Bisrat Branch (Bisrate Gebriel Road)</option>
                    <option>Gofa Branch</option>
                    <option>Mekanisa Branch</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Register Student</button>
            
            <p class="form-footer">
                Already registered? <a href="#">Sign In</a>
            </p>
        </form>
    </div>

</body>
</html>
